<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DealRadar - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: #1e293b;
      border-radius: 15px;
      padding: 40px;
      width: 400px;
      border: 1px solid #3b82f6;
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.2);
    }

    .logo {
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      color: #3b82f6;
      margin-bottom: 5px;
    }

    .tagline {
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #94a3b8;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      outline: none;
    }

    .form-group input:focus {
      border-color: #3b82f6;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
    }

    .login-btn:hover {
      background: #2563eb;
    }

    .divider {
      text-align: center;
      color: #94a3b8;
      margin: 20px 0;
      font-size: 14px;
    }

    .signup-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: #3b82f6;
      border: 1px solid #3b82f6;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .forgot {
      text-align: right;
      margin-top: 8px;
    }

    .forgot a {
      color: #3b82f6;
      font-size: 12px;
      text-decoration: none;
    }

    .error-msg {
      background: #ef444420;
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 14px;
      display: none;
    }

    .success-msg {
      background: #22c55e20;
      border: 1px solid #22c55e;
      color: #22c55e;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 14px;
      display: none;
    }

    .features {
      display: flex;
      justify-content: space-around;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #334155;
    }

    .feature {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
    }

    .feature span {
      display: block;
      font-size: 20px;
      margin-bottom: 4px;
    }
  </style>
</head>

<body>

  <div class="login-container">

    <!-- Logo -->
    <div class="logo">🎯 DealRadar</div>
    <div class="tagline">AI-Powered Deal Detection System</div>

    <!-- Error Message -->
    <div class="error-msg" id="errorMsg">
      ❌ Wrong username or password!
    </div>

    <!-- Success Message -->
    <div class="success-msg" id="successMsg">
      ✅ Login Successful! Redirecting...
    </div>

    <!-- Form -->
    <div class="form-group">
      <label>📧 Email / Username</label>
      <input type="text" id="username" placeholder="Enter your email">
    </div>

    <div class="form-group">
      <label>🔒 Password</label>
      <input type="password" id="password" placeholder="Enter your password">
      <div class="forgot"><a href="#">Forgot Password?</a></div>
    </div>

    <button class="login-btn" onclick="doLogin()">🚀 Login to DealRadar</button>

    <div class="divider">— OR —</div>

    <button class="signup-btn" onclick="window.location.href='signup.html'">
      ✨ Create New Account
    </button>

    <!-- Features -->
    <div class="features">
      <div class="feature">
        <span>🔍</span>
        24/7 Scanning
      </div>
      <div class="feature">
        <span>⚡</span>
        Instant Alerts
      </div>
      <div class="feature">
        <span>🏆</span>
        Beat Competitors
      </div>
    </div>

  </div>

  <script>
    function doLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      // Hide messages
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('successMsg').style.display = 'none';

      // Simple validation
      if (username === '' || password === '') {
        document.getElementById('errorMsg').innerHTML = '❌ Please fill all fields!';
        document.getElementById('errorMsg').style.display = 'block';
        return;
      }

      // login
      if (username === 'admin' && password === '1234') {
        document.getElementById('successMsg').style.display = 'block';
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);
      } else {
        document.getElementById('errorMsg').innerHTML = '❌ Wrong username or password!<br>Use: admin / 1234';
        document.getElementById('errorMsg').style.display = 'block';
      }
    }

    // Enter key
    document.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') doLogin();
    });
  </script>

</body>

</html>
